name: Automated Scraper VM Deployment

on:
  push:
    branches: [ "main" ]  # Triggers instantly on code changes

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Check out Repository Code
      uses: actions/checkout@v4

    - name: Setup Docker Environment
      uses: docker/setup-buildx-action@v3

    - name: Build Code Image Layer
      run: |
        docker build -t fb_scraper_bot:latest .
        docker save fb_scraper_bot:latest | gzip > fb_scraper_bot.tar.gz

    - name: Deploy Build Securely over SSH to GCP VM
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.GCP_VM_IP }}
        username: ${{ secrets.GCP_SSH_USER }}
        key: ${{ secrets.GCP_SSH_KEY }}
        source: "fb_scraper_bot.tar.gz"
        target: "/home/${{ secrets.GCP_SSH_USER }}/deploy_staging/"

    - name: Execute Live Container Swapping System
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.GCP_VM_IP }}
        username: ${{ secrets.GCP_SSH_USER }}
        key: ${{ secrets.GCP_SSH_KEY }}
        script: |
          # Load the transferred container image architecture
          gzip -d -c ~/deploy_staging/fb_scraper_bot.tar.gz | sudo docker load

          # Safely cycle runtime instances without looping configuration crashes
          sudo docker stop my_fb_bot || true
          sudo docker rm my_fb_bot || true

          # Spin up localized sandboxed daemon container thread
          sudo docker run -d \
            --name my_fb_bot \
            --restart always \
            -e TELEGRAM_BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}" \
            -e ALLOWED_USER_ID="${{ secrets.ALLOWED_USER_ID }}" \
            fb_scraper_bot:latest

          # Clean up staging zip artifacts to preserve VM disk partition space
          rm -f ~/deploy_staging/fb_scraper_bot.tar.gz
